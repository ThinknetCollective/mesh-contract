name: Feature Request
description: Suggest an improvement or new feature for Mesh Contract
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Describe your idea clearly so the community can evaluate and discuss it.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What is the current limitation?
      placeholder: "Currently there is no way to…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
      placeholder: "Add a contract that…"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Contract Area
      description: Which area of the codebase does this affect?
      options:
        - Token (THINK token)
        - Reputation Registry
        - Impact NFT
        - DAO Governance
        - Bounty Escrow
        - Staking
        - Treasury
        - Tooling / Scripts
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated Difficulty
      options:
        - Easy (< 5 hours)
        - Medium (5–8 hours)
        - Hard (8+ hours)
